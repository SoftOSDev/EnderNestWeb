<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
<link rel="icon" type="image/png" href="/icon.png">
    <title>末影阁 EnderNest - Minecraft服务器</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="styles1.css" />
  </head>
  <body>

      <a>
        <div class="liquidGlass-wrapper dock">
          <div class="liquidGlass-effect"></div>
          <div class="liquidGlass-tint"></div>
          <div class="liquidGlass-shine"></div>
          <div class="liquidGlass-text">
            <div class="dock">
                <div>
                    <div >
                        <h1 class="server-title">末影阁 EnderNest</h1>
                        <p class="server-subtitle">欢迎来到我们的Minecraft服务器</p>
                        
                        <div class="stats">
                            <div class="stat-item">
                                <span class="stat-number" id="onlinePlayers">
                                    <span class="loading"></span>
                                </span>
                                <div class="stat-label">在线玩家</div>
                            </div>
                            <div class="stat-item">
                                <span class="stat-number" id="maxPlayers">
                                    <span class="loading"></span>
                                </span>
                                <div class="stat-label">最大人数</div>
                            </div>
                        </div>
            
            
                        <div class="footer-info">
                            
                            <div class="footer-item">
                                <span>📋 Favicon</span>
                                <strong>已配置</strong>
                            </div>
                            <div class="footer-item">
                                <span>📝 在线监控</span>
                                <strong><a href="https://monitor.l-w.top/">点我</a></strong>
                            </div>
                            <div class="footer-item">
                                <span>🌐 地址</span>
                                <strong>mc.l-w.top</strong>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
          </div>
        </div>
      </a>

      
    </div>

    <svg style="display: none">
      <filter
        id="glass-distortion"
        x="0%"
        y="0%"
        width="100%"
        height="100%"
        filterUnits="objectBoundingBox"
      >
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.01 0.01"
          numOctaves="1"
          seed="5"
          result="turbulence"
        />
        <!-- Seeds: 14, 17,  -->

        <feComponentTransfer in="turbulence" result="mapped">
          <feFuncR type="gamma" amplitude="1" exponent="10" offset="0.5" />
          <feFuncG type="gamma" amplitude="0" exponent="1" offset="0" />
          <feFuncB type="gamma" amplitude="0" exponent="1" offset="0.5" />
        </feComponentTransfer>

        <feGaussianBlur in="turbulence" stdDeviation="3" result="softMap" />

        <feSpecularLighting
          in="softMap"
          surfaceScale="5"
          specularConstant="1"
          specularExponent="100"
          lighting-color="white"
          result="specLight"
        >
          <fePointLight x="-200" y="-200" z="300" />
        </feSpecularLighting>

        <feComposite
          in="specLight"
          operator="arithmetic"
          k1="0"
          k2="1"
          k3="1"
          k4="0"
          result="litImage"
        />

        <feDisplacementMap
          in="SourceGraphic"
          in2="softMap"
          scale="150"
          xChannelSelector="R"
          yChannelSelector="G"
        />
      </filter>
    </svg>
    
    <script>
        // 复制服务器地址
        function copyAddress() {
            const address = 'mc.l-w.top';
            navigator.clipboard.writeText(address).then(() => {
                const btn = document.querySelector('.copy-btn');
                const btnText = document.getElementById('btnText');
                const originalText = btnText.textContent;
                
                btn.classList.add('copied');
                btnText.textContent = '已复制!';
                
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btnText.textContent = originalText;
                }, 2000);
            }).catch(err => {
                // 兼容旧浏览器
                const textArea = document.createElement('textarea');
                textArea.value = address;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                const btn = document.querySelector('.copy-btn');
                const btnText = document.getElementById('btnText');
                btnText.textContent = '已复制!';
                setTimeout(() => {
                    btnText.textContent = '复制';
                }, 2000);
            });
        }

        // 创建飘落的樱花
        

        // 从API获取服务器数据
        async function fetchServerData() {
            try {
                const response = await fetch('https://list.mczfw.com/api/mc.l-w.top');
                if (!response.ok) {
                    throw new Error('网络响应失败');
                }
                const data = await response.json();
                
                // 更新在线人数 (p)
                const onlinePlayers = document.getElementById('onlinePlayers');
                onlinePlayers.textContent = data.p || 0;
                
                // 更新最大人数 (mp)
                const maxPlayers = document.getElementById('maxPlayers');
                maxPlayers.textContent = data.mp || 0;
                
            } catch (error) {
                console.error('获取服务器数据失败:', error);
                // 显示错误信息
                document.getElementById('onlinePlayers').textContent = '-';
                document.getElementById('maxPlayers').textContent = '-';
            }
        }

        // 页面加载时获取数据
        window.addEventListener('load', () => {
            // 添加一些初始樱花
            
            
            // 首次获取数据
            fetchServerData();
            
            // 每30秒刷新一次数据
            setInterval(fetchServerData, 30000);
        });
    </script>

  </body>
</html>
